<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Cruelty-Free Checker</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="popup">
    <h1>Cruelty-Free Checker</h1>

    <section class="card">
      <p class="label">Detected brand</p>
      <p id="brand" class="brand">Checking...</p>

      <p class="label">Status</p>
      <p id="status" class="status unknown">Unknown</p>

      <p id="message" class="message">Open a shopping product page and click the extension.</p>
    </section>
  </main>

  <script src="popup.js"></script>
</body>
</html>
